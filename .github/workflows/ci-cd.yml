name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint PHP files
        run: |
          set -e
          find api -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Check JavaScript syntax
        run: |
          set -e
          find . -type f -name "*.js" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            node --check "$file"
          done

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify deploy secrets
        id: deploy_check
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets['DEPLOY_HOST'] }}
          DEPLOY_USER: ${{ secrets['DEPLOY_USER'] }}
          DEPLOY_KEY: ${{ secrets['DEPLOY_SSH_PRIVATE_KEY'] }}
          DEPLOY_PORT: ${{ secrets['DEPLOY_PORT'] }}
          DEPLOY_PATH: ${{ secrets['DEPLOY_PATH'] }}
        run: |
          set -e
          missing=0
          for key in DEPLOY_HOST DEPLOY_USER DEPLOY_KEY DEPLOY_PORT DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "::warning::Missing secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy files over SSH
        if: steps.deploy_check.outputs.ready == 'true'
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='.vscode'
          path: ./
          remote_path: ${{ secrets['DEPLOY_PATH'] }}
          remote_host: ${{ secrets['DEPLOY_HOST'] }}
          remote_user: ${{ secrets['DEPLOY_USER'] }}
          remote_key: ${{ secrets['DEPLOY_SSH_PRIVATE_KEY'] }}
          remote_port: ${{ secrets['DEPLOY_PORT'] }}

      - name: Skip deploy when secrets are missing
        if: steps.deploy_check.outputs.ready != 'true'
        run: 'echo "Deploy skipped: add DEPLOY_* repository secrets to enable CD."'
