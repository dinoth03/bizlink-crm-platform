<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizLink - Shared Wishlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --navy: #000080; --t1: #0f172a; --t2: #475569; --bg: #f8fafc; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--t1); margin: 0; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--navy); margin: 0; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); border: 1px solid #e2e8f0; }
    .thumb { font-size: 3rem; margin-bottom: 15px; display: block; text-align: center; }
    h3 { margin: 10px 0 5px; font-size: 1.1rem; }
    .price { font-weight: 700; color: var(--navy); }
    .muted { color: var(--t2); font-size: 0.85rem; }
    .btn { display: block; width: 100%; padding: 12px; background: var(--navy); color: #fff; border: none; border-radius: 8px; margin-top: 15px; cursor: pointer; text-decoration: none; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div style="font-size: 2rem; margin-bottom: 10px;">🎁</div>
      <h1 id="wishlistTitle">Shared Wishlist</h1>
      <p id="wishlistSubtitle">Loading products...</p>
    </header>

    <div class="grid" id="wishlistGrid"></div>
  </div>

  <script src="../assets/js/api.js"></script>
  <script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) {
            document.getElementById('wishlistSubtitle').textContent = 'Invalid wishlist link.';
            return;
        }

        try {
            const resp = await fetch('../api/get_public_wishlist.php?customer_id=' + cid).then(r => r.json());
            if (resp && resp.success) {
                const data = resp.data;
                document.getElementById('wishlistTitle').textContent = data.customer_name + "'s Wishlist";
                document.getElementById('wishlistSubtitle').textContent = "Handpicked items saved on BizLink Marketplace.";
                
                const grid = document.getElementById('wishlistGrid');
                if (data.items.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--t2);">This wishlist is currently empty.</p>';
                    return;
                }

                grid.innerHTML = data.items.map(p => `
                    <div class="card">
                        <span class="thumb">${pickEmoji(p.category)}</span>
                        <h3>${p.product_name}</h3>
                        <p class="muted">${p.vendor_name}</p>
                        <div class="price">LKR ${Number(p.price).toLocaleString()}</div>
                        <a href="marketplace.html?id=${p.product_id}" class="btn">View on Marketplace</a>
                    </div>
                `).join('');
            } else {
                document.getElementById('wishlistSubtitle').textContent = 'Wishlist not found or private.';
            }
        } catch (err) {
            document.getElementById('wishlistSubtitle').textContent = 'Unable to load wishlist.';
        }
    })();

    function pickEmoji(cat) {
        const map = { electronics: '💻', fashion: '👗', home: '🏠', grocery: '🛒', agriculture: '🌾' };
        return map[String(cat).toLowerCase()] || '📦';
    }
  </script>
</body>
</html>
