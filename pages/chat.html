<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BizLink — CRM Chat</title>
  <link rel="stylesheet" href="../assets/css/chat.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Sinhala:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- AMBIENT BACKGROUND -->
<div class="ambient">
  <div class="amb-grid"></div>
  <div class="amb-orb orb-navy"></div>
  <div class="amb-orb orb-green"></div>
  <div class="amb-orb orb-orange"></div>
  <div class="scanlines"></div>
</div>

<!--SHELL-->
<div class="shell">

  <!-- LEFT RAIL — conversations-->
  <aside class="left-rail" id="leftRail">

    <!-- Rail Header -->
    <header class="rail-header">
      <div class="rail-brand">
        <a href="home.html" class="logo-wrap">
          <span class="logo-hex">⬡</span>
          <span class="logo-text">Biz<strong>Link</strong></span>
        </a>
        <span class="chat-label">Chat</span>
      </div>
      <div class="rail-actions">
        <button class="rail-icon-btn" id="newChatBtn" onclick="openNewChat()" title="New conversation">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="rail-icon-btn mobile-only" onclick="closeRail()" title="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </header>

    <!-- Search -->
    <div class="rail-search-wrap">
      <div class="rail-search">
        <svg class="search-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" type="text" class="search-input" placeholder="Search conversations…" oninput="filterConvos(this.value)"/>
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <!-- Filter chips -->
    <div class="filter-chips">
      <button class="fchip active" data-filter="all"      onclick="setFilter('all',this)">All</button>
      <button class="fchip"        data-filter="unread"   onclick="setFilter('unread',this)">Unread <span class="fchip-count" id="unreadCount">3</span></button>
      <button class="fchip"        data-filter="vendors"  onclick="setFilter('vendors',this)">Vendors</button>
      <button class="fchip"        data-filter="customers" onclick="setFilter('customers',this)">Customers</button>
      <button class="fchip"        data-filter="admin"    onclick="setFilter('admin',this)">Admin</button>
    </div>

    <!-- Conversation List -->
    <div class="convo-list" id="convoList">
      <!-- Injected by JS -->
    </div>

    <!-- Rail Footer / User Card -->
    <div class="rail-footer">
      <div class="rail-user">
        <div class="ru-avatar" style="background: var(--vendor)">YN</div>
        <div class="ru-info">
          <span class="ru-name">Your Name</span>
          <span class="ru-role">Your Role</span>
        </div>
        <div class="ru-status">
          <div class="status-dot online"></div>
        </div>
        <button class="rail-icon-btn" onclick="toggleSettings()" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!--MAIN — chat window-->
  <main class="chat-main" id="chatMain">

    <!-- ── EMPTY STATE (no convo selected) ── -->
    <div class="empty-state" id="emptyState">
      <div class="es-glow"></div>
      <div class="es-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2 class="es-title">BizLink CRM Chat</h2>
      <p class="es-body">Select a conversation from the left, or start a new one. New customers can message admin or vendors right away — all in one place.</p>
      <p class="es-sin">ගනුදෙනු සහ සැබෑ සම්බන්ධතා</p>
      <button class="es-btn" onclick="openNewChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Start a conversation
      </button>
    </div>

    <!-- ── ACTIVE CHAT ── -->
    <div class="chat-window hidden" id="chatWindow">

      <!-- Chat Header -->
      <header class="chat-header" id="chatHeader">
        <button class="mobile-back-btn" onclick="openRail()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="ch-avatar-wrap" id="chAvatar"></div>
        <div class="ch-info">
          <div class="ch-name" id="chName"></div>
          <div class="ch-meta" id="chMeta"></div>
        </div>
        <div class="ch-actions">
          <button class="ch-btn" id="searchToggleBtn" onclick="toggleMsgSearch()" title="Search messages">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
          <button class="ch-btn" onclick="toggleCallMenu()" title="Voice call" id="callBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.08 6.08l1.48-.93c.59-.37 1.388-.457 2.11-.45.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>
          </button>
          <button class="ch-btn" onclick="toggleVideoCall()" title="Video call">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
          <button class="ch-btn" onclick="toggleInfoPanel()" title="Contact info" id="infoPanelBtn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </button>
          <button class="ch-btn ch-more-btn" onclick="toggleMoreMenu(this)" title="More">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
            <div class="more-menu" id="moreMenu">
              <button class="mm-item" onclick="clearChat()">🗑️ Clear chat</button>
              <button class="mm-item" onclick="muteConvo()">🔇 Mute notifications</button>
              <button class="mm-item" onclick="pinConvo()">📌 Pin conversation</button>
              <button class="mm-item" onclick="exportChat()">📥 Export chat</button>
              <button class="mm-item mm-danger" onclick="blockContact()">🚫 Block contact</button>
            </div>
          </button>
        </div>
      </header>

      <!-- Message Search Bar -->
      <div class="msg-search-bar hidden" id="msgSearchBar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="msg-search-input" placeholder="Search in this conversation…" oninput="searchMessages(this.value)"/>
        <span class="msg-search-count" id="msgSearchCount"></span>
        <button onclick="toggleMsgSearch()">✕</button>
      </div>

      <!-- Messages Area -->
      <div class="messages-area" id="messagesArea">
        <div class="messages-inner" id="messagesInner">
          <!-- Injected by JS -->
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator hidden" id="typingIndicator">
        <div class="ti-avatar" id="tiAvatar"></div>
        <div class="ti-bubble">
          <span class="ti-dot"></span>
          <span class="ti-dot"></span>
          <span class="ti-dot"></span>
        </div>
        <span class="ti-label" id="tiLabel"></span>
      </div>

      <!-- Quick Replies -->
      <div class="quick-replies" id="quickReplies"></div>

      <!-- Compose Bar -->
      <div class="compose-bar" id="composeBar">
        <div class="compose-toolbar">
          <button class="ct-btn" onclick="toggleEmojiPicker()" title="Emoji" id="emojiBtn">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
          </button>
          <button class="ct-btn" onclick="attachFile()" title="Attach file">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <button class="ct-btn" onclick="attachImage()" title="Attach image">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </button>
          <div class="ct-divider"></div>
          <button class="ct-btn" onclick="insertTemplate()" title="Templates">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </button>
        </div>

        <div class="compose-input-row">
          <div class="compose-input-wrap">
            <div class="compose-input"
              id="composeInput"
              contenteditable="true"
              data-placeholder="Type a message…"
              onkeydown="handleKey(event)"
              oninput="handleInput(this)"
            ></div>
            <div class="char-count" id="charCount"></div>
          </div>

          <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
            <svg class="send-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

        <!-- Emoji Picker -->
        <div class="emoji-picker hidden" id="emojiPicker">
          <div class="ep-header">
            <span>Emoji</span>
            <button onclick="toggleEmojiPicker()">✕</button>
          </div>
          <div class="ep-grid" id="epGrid"></div>
        </div>

        <!-- Template Panel -->
        <div class="template-panel hidden" id="templatePanel">
          <div class="tp-header">Quick Templates <button onclick="closeTemplates()">✕</button></div>
          <div class="tp-list" id="tpList"></div>
        </div>
      </div>

    </div><!-- /chat-window -->
  </main>

  <!--RIGHT PANEL — contact info-->
  <aside class="info-panel hidden" id="infoPanel">
    <div class="ip-header">
      <span>Contact Info</span>
      <button class="rail-icon-btn" onclick="toggleInfoPanel()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="ip-body" id="ipBody"></div>
  </aside>

</div><!-- /shell -->

<!--NEW CHAT MODAL-->
<div class="modal-backdrop hidden" id="modalBackdrop" onclick="closeNewChat(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-head">
      <h3>New Conversation</h3>
      <button onclick="closeNewChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="mb-search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="mb-search" id="contactSearch" placeholder="Search admin or vendor contacts by name, company…" oninput="filterContacts(this.value)"/>
      </div>
      <div class="contact-grid" id="contactGrid"></div>
    </div>
  </div>
</div>

<!--TOAST-->
<div class="toast-stack" id="toastStack"></div>

<!--CALL OVERLAY-->
<div class="call-overlay hidden" id="callOverlay">
  <div class="call-box">
    <div class="call-avatar" id="callAvatar"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-status" id="callStatus">Calling…</div>
    <div class="call-timer hidden" id="callTimer">00:00</div>
    <div class="call-actions">
      <button class="ca-btn mute-btn" onclick="toggleMute(this)" title="Mute">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="ca-btn end-btn" onclick="endCall()" title="End call">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.08 6.08l1.48-.93c.59-.37 1.388-.457 2.11-.45.907.339 1.85.573 2.81.7A2 2 0 0 1 22 17z"/></svg>
      </button>
      <button class="ca-btn spk-btn" onclick="toggleSpeaker(this)" title="Speaker">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
    </div>
  </div>
</div>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/chat.js"></script>
</body>
</html>
